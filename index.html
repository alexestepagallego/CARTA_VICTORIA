<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café-Bar Victoria | Carta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        .gold {
            color: #D4AF37;
        }

        /* El verde azulado del rótulo de tu entrada */
        .bg-victoria-green {
            background-color: #2D5A5A;
        }

        body {
            background-color: #B57C3E;
            font-family: sans-serif;
        }

        /* Estilo para los títulos Serif como tu cartel */
        .font-serif-victoria {
            font-family: 'Playfair Display', serif;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .no-scroll::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="text-gray-900">

    <header
        class="bg-victoria-green text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-2xl border-b-2 border-[#D4AF37]">
        <h1 class="text-2xl font-serif-victoria gold italic tracking-widest text-center w-full" id="header-title">
            VICTORIA</h1>
        <button id="btn-atras" onclick="mostrarCategorias()"

            ← VOLVER
        </button>
    </header>

        <div id="vista-categorias" class="fade-in space-y-5 pb-20">
            <h2 class="text-center text-3xl font-serif-victoria italic my-6 text-white drop-shadow-md">Nuestra Carta
            </h2>

            <div id="contenedor-categorias-principal" class="space-y-5"></div>
        </div>

        <div id="vista-platos" class="hidden fade-in">
            <h3 id="titulo-actual"
                class="text-2xl font-serif-victoria mb-6 flex items-center uppercase tracking-widest text-white italic">
                <span class="w-10 h-[1px] bg-[#D4AF37] mr-3"></span>
                CATEGORÍA
            </h3>
            <div id="grid-platos" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <div id="dish-detail"
        class="fixed inset-0 z-[60] transform translate-y-full transition-transform duration-500 ease-in-out overflow-y-auto"
        style="background-color: #B57C3E;">

        <button onclick="closeDetail()"
            class="absolute top-6 right-6 bg-[#2D5A5A] text-[#D4AF37] w-12 h-12 rounded-full shadow-2xl z-10 font-bold border-2 border-[#D4AF37] flex items-center justify-center text-xl active:scale-90 transition-transform">✕</button>

        <div class="flex flex-col items-center justify-center min-h-screen p-6">

            <div class="relative mb-10">
                <div
                    class="w-60 h-60 rounded-full border-4 border-[#D4AF37] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-stone-300">
                    <img id="detail-img" src="" class="w-full h-full object-cover">
                </div>
                <div
                    class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-[#2D5A5A] px-6 py-1 rounded-full border-2 border-[#D4AF37] shadow-lg">
                    <span id="detail-price" class="text-[#D4AF37] font-bold text-xl tracking-tight"></span>
                </div>
            </div>

            <div class="w-full bg-[#fdfaf6] rounded-[2.5rem] p-8 shadow-2xl border-t-8 border-[#2D5A5A] relative">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-16 h-1.5 bg-[#D4AF37] rounded-full"></div>

                <h2 id="detail-title" class="text-3xl font-serif-victoria gold text-center mb-8 italic leading-tight">
                </h2>

                <div class="space-y-8">
                    <div class="text-center">
                        <h4 class="text-[10px] uppercase tracking-[0.4em] text-[#2D5A5A] font-black mb-3 opacity-60">
                            Ingredientes Seleccionados</h4>
                        <p id="detail-ingredients"
                            class="text-stone-700 text-lg leading-relaxed font-medium italic px-4"></p>
                    </div>

                    <div class="text-center pt-4 border-t border-stone-100">
                        <h4 class="text-[10px] uppercase tracking-[0.4em] text-[#2D5A5A] font-black mb-4 opacity-60">
                            Información Alérgenos</h4>
                        <div id="detail-alergenos" class="flex justify-center gap-5 mt-2">
                        </div>
                    </div>
                </div>

                <button onclick="closeDetail()"
                    class="mt-12 w-full bg-[#2D5A5A] text-[#D4AF37] py-4 rounded-2xl font-bold shadow-lg border-2 border-[#D4AF37] active:scale-95 transition-transform uppercase tracking-[0.2em] text-sm">
                    Regresar a la carta
                </button>
            </div>

            <p class="mt-8 text-white/40 text-[10px] uppercase tracking-[0.5em] font-serif-victoria italic">Café-Bar

        function renderCategorias() {
            const container = document.getElementById('contenedor-categorias-principal');
            container.innerHTML = categorias.map(cat => `
                <div onclick="filtrar('${cat.id}')" class="relative h-36 rounded-2xl overflow-hidden shadow-2xl border border-white/10 active:scale-95 transition-transform cursor-pointer">
                    <img src="${cat.foto}" class="absolute inset-0 w-full h-full object-cover opacity-60 bg-stone-700" alt="${cat.id}">
                    <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                        <span class="text-white text-3xl font-serif-victoria italic tracking-[0.1em] uppercase">${cat.id}</span>
                    </div>
                </div>
            `).join('');
        }

        function filtrar(cat) {
            document.getElementById('vista-categorias').classList.add('hidden');
            document.getElementById('vista-platos').classList.remove('hidden');
            document.getElementById('btn-atras').classList.remove('hidden');
            document.getElementById('header-title').classList.add('hidden');
            document.getElementById('titulo-actual').innerText = cat;
            const grid = document.getElementById('grid-platos');
            grid.innerHTML = '';
            const filtrados = platos.filter(p => p.categoria === cat);
            if (filtrados.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-white/80 py-10 italic">Próximamente disponible...</p>';
            } else {
                filtrados.forEach(plato => {
                    grid.innerHTML += `
                        <div onclick="openDetail(${plato.id})" class="bg-white rounded-3xl shadow-lg overflow-hidden active:scale-95 transition-transform duration-200 text-center border-b-4 border-gold/20">
                            <img src="${plato.foto}" class="w-full h-36 object-cover bg-stone-200">
                            <div class="p-4">
                                <h4 class="font-serif-victoria font-bold text-base h-10 leading-tight flex items-center justify-center">${plato.nombre}</h4>
                                <p class="gold font-bold text-lg mt-2">${plato.precio}</p>
                            </div>
                        </div>`;
                });
            }
            window.scrollTo(0, 0);
        }

        function mostrarCategorias() {
            document.getElementById('vista-categorias').classList.remove('hidden');
            document.getElementById('vista-platos').classList.add('hidden');
            document.getElementById('btn-atras').classList.add('hidden');
            document.getElementById('header-title').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function openDetail(id) {
            const p = platos.find(x => x.id === id);
            document.getElementById('detail-img').src = p.foto;
            document.getElementById('detail-title').innerText = p.nombre;
            document.getElementById('detail-price').innerText = p.precio;
            document.getElementById('detail-ingredients').innerText = p.ingredientes;
            document.getElementById('detail-alergenos').innerHTML = p.ale ? p.ale.map(a => `<div class="w-12 h-12 rounded-full border border-stone-100 flex items-center justify-center bg-stone-50 text-xl shadow-inner">${a}</div>`).join('') : '';
            document.getElementById('dish-detail').classList.remove('translate-y-full');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('dish-detail').classList.add('translate-y-full');
            document.body.style.overflow = 'auto';
        }

        window.onload = renderCategorias;
    </script>



</body>

</html>
